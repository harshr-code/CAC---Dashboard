<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>S&M CAC Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Calibri,Arial,sans-serif}
body{background:#eef2f8;font-size:13px;color:#1a2a4a;height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* Top bar */
.topbar{background:#0c2461;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.tb-logo{font-size:14px;font-weight:700;color:#fff;margin-right:6px}
.sel-wrap{display:flex;align-items:center;gap:6px}
.sel-lbl{font-size:10px;color:#8ab4e0;text-transform:uppercase;letter-spacing:.3px}
select{padding:4px 8px;border-radius:2px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.12);color:#fff;font-size:12px;font-family:Calibri,Arial,sans-serif;cursor:pointer;outline:none}
select option{background:#1a3a8a;color:#fff}
.month-pills{display:flex;gap:3px;flex-wrap:wrap}
.mpill{padding:3px 8px;border-radius:2px;font-size:10px;cursor:pointer;border:1px solid rgba(255,255,255,0.25);color:#b8d0f0;user-select:none}
.mpill.on{background:#fff;color:#0c2461;font-weight:700;border-color:#fff}
.tabs{display:flex;gap:3px;margin-left:auto}
.tab{padding:5px 10px;background:rgba(255,255,255,0.12);color:#b8d0f0;border:none;border-radius:2px;cursor:pointer;font-size:11px;font-family:Calibri,Arial,sans-serif;white-space:nowrap}
.tab.on{background:#fff;color:#0c2461;font-weight:700}
/* Main content */
.cnt{flex:1;overflow-y:auto;padding:9px 12px}
/* Callouts */
.callout-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.callout{padding:4px 10px;border-radius:2px;font-size:11px;font-weight:600;border-left:3px solid;line-height:1.4}
.callout.c{background:#fff0f0;border-color:#b91c1c;color:#b91c1c}
.callout.w{background:#fffbeb;border-color:#d97706;color:#92590a}
.callout.s{background:#f0fdf4;border-color:#15803d;color:#15803d}
.callout.i{background:#eff6ff;border-color:#1d4ed8;color:#1d4ed8}
/* Severity badge */
.sev{display:inline-block;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;margin-bottom:6px}
.sev.c{background:#b91c1c;color:#fff}
.sev.w{background:#d97706;color:#fff}
.sev.s{background:#15803d;color:#fff}
/* KPI cards */
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.mc{background:#fff;border:1px solid #d0dff0;border-radius:2px;padding:8px}
.ml{font-size:10px;color:#7090b0;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.mv{font-size:16px;font-weight:700;color:#0c2461}
.ms{font-size:10px;margin-top:2px}
/* Section title */
.stitle{font-size:10px;font-weight:700;color:#0c2461;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;padding-bottom:3px;border-bottom:2px solid #0c2461}
.card{background:#fff;border:1px solid #d0dff0;border-radius:2px;padding:8px;margin-bottom:8px}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#0c2461;color:#fff;padding:5px 7px;text-align:right;font-size:11px;white-space:nowrap}
th.tl{text-align:left}
td{padding:4px 7px;border-bottom:1px solid #e8eef8;text-align:right;white-space:nowrap}
td.tl{text-align:left;font-weight:500;color:#0c2461}
tr:last-child td{border-bottom:none}
tr.br td{font-weight:700;background:#dbeafe}
tr.br td.tl{color:#0c2461}
tr.sr td.tl{padding-left:16px;color:#4a6080;font-weight:400}
tr.sr2 td.tl{padding-left:26px;color:#6a80a0;font-weight:400;font-style:italic}
tr.tot-row td{font-weight:700;background:#0c2461;color:#fff}
tr.tot-row td.tl{color:#fff}
tr.sub-hdr td{background:#e8f0fe;font-weight:700;color:#0c2461;font-size:11px}
/* Highlight cells */
td.neg{color:#b91c1c;font-weight:700}
td.pos{color:#166534;font-weight:700}
.red{color:#b91c1c;font-weight:700}
.grn{color:#166534;font-weight:700}
/* Expand toggle */
.exp-btn{cursor:pointer;color:#1d4ed8;font-size:10px;margin-left:4px;user-select:none}
tr.expanded-sub{background:#f8faff}
tr.expanded-sub td.tl{padding-left:22px;color:#4060a0;font-weight:400;font-style:italic}
/* Clickable */
.cl{cursor:pointer;text-decoration:underline;color:#1d4ed8}
/* Two-col layout */
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
/* Funnel */
.fp-cell{cursor:pointer;color:#1d4ed8;text-decoration:underline dotted;padding:1px 2px;border-radius:2px}
.fp-cell:hover{background:#dbeafe}
.fp-active{background:#0c2461;color:#fff;border-radius:2px;text-decoration:none;padding:1px 3px}
/* Buttons */
.bbtn{background:#dbeafe;border:1px solid #0c2461;color:#0c2461;padding:4px 9px;border-radius:2px;cursor:pointer;font-size:11px;margin-bottom:7px;font-family:Calibri,Arial,sans-serif}
.sx{overflow-x:auto}
/* Insights */
.ins-hdg{font-size:12px;font-weight:700;color:#0c2461;margin-bottom:4px;padding:4px 8px;background:#dbeafe;border-radius:2px}
.ins-line{font-size:12px;padding:4px 8px;line-height:1.6;font-weight:500}
.ins-line.sig{color:#b91c1c;font-weight:700}
.ins-line.diag{color:#1a2a4a;font-weight:500}
.ins-line.impl{color:#166534;font-weight:600}
.ins-sec{margin-bottom:8px}
/* Charts */
.chart-wrap{position:relative;height:200px}
.chart-wrap-lg{position:relative;height:240px}
/* Comparison */
.cmp-grid{display:grid;grid-template-columns:200px 1fr 1fr;gap:0;border:1px solid #d0dff0;border-radius:2px;overflow:hidden;margin-bottom:8px}
.cmp-hdr{background:#0c2461;color:#fff;padding:6px 8px;font-size:11px;font-weight:700;text-align:center}
.cmp-lbl{background:#f0f4fa;padding:4px 8px;font-size:11px;color:#0c2461;font-weight:500;border-bottom:1px solid #e0e8f4;border-right:1px solid #e0e8f4}
.cmp-val{padding:4px 8px;font-size:11px;text-align:right;border-bottom:1px solid #e0e8f4;border-right:1px solid #e0e8f4}
.cmp-val:last-child{border-right:none}
.cmp-sec{background:#dbeafe;padding:5px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#0c2461;grid-column:1/-1;border-bottom:1px solid #d0dff0}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">S&amp;M CAC</div>

  <div class="sel-wrap">
    <div class="sel-lbl">City</div>
    <select id="citySelect" onchange="onCityChange()">
      <optgroup label="India — Existing" id="grp-existing"></optgroup>
      <optgroup label="India — Expansion" id="grp-expansion"></optgroup>
    </select>
  </div>

  <div class="sel-wrap">
    <div class="sel-lbl">Months (2–7)</div>
    <div class="month-pills" id="monthPills"></div>
  </div>

  <div class="tabs">
    <button class="tab on"  onclick="showTab('summary')">Summary</button>
    <button class="tab"     onclick="showTab('charts')">Charts</button>
    <button class="tab"     onclick="showTab('salesorg')">Sales Org</button>
    <button class="tab"     onclick="showTab('insights')">Insights</button>
    <button class="tab"     onclick="showTab('compare')">Compare</button>
  </div>
</div>

<div class="cnt" id="content"></div>

// ── Helpers ────────────────────────────────────────────────────────────────
function gd(city,m){return(D[m]||{})[city]||{};}
function fmt(n){if(n===null||n===undefined)return"-";const v=Number(n);if(isNaN(v)||v===0)return v===0?"-":"-";return Math.round(v).toLocaleString("en-IN");}
function fmtL(n){if(!n&&n!==0)return"-";const v=n/100000;return v===0?"-":v.toFixed(1);}
function fmtPct(n){if(n===null||n===undefined)return"-";return Number(n).toFixed(1)+"%";}
function pct(a,b){if(!b||b===0)return null;return(a-b)/b*100;}
function clr(v,inv){if(v===null||v===undefined)return"";return(inv?v<0:v>0)?"red":"grn";}
function arr(v){if(!v&&v!==0)return"";return v>0?"▲":"▼";}
function p2(v){if(v===null||v===undefined)return"-";return(v>0?"+":"")+v.toFixed(1)+"%";}
function sKey(ch){return"sales_cac_"+(ch==="BTL Activity"?"BTL":ch);}
function sCostKey(ch){return"sales_cost_ch_"+(ch==="BTL Activity"?"BTL":ch);}
function killChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function killAll(){Object.keys(charts).forEach(id=>killChart(id));}

// ── Negative highlight: td class for CAC/cost increases (bad) or HoTo/conv decrease (bad) ──
function hlCac(cur, prev) {
  if(!prev||!cur)return"";
  const c=pct(cur,prev);
  if(c===null)return"";
  return c>5?"neg":c<-5?"pos":"";
}
function hlHoto(cur,prev){
  if(!prev||!cur)return"";
  const c=pct(cur,prev);
  if(c===null)return"";
  return c<-5?"neg":c>5?"pos":"";
}

// ── Month pills init ──────────────────────────────────────────────────────
function initMonthPills(){
  const el=document.getElementById("monthPills");
  el.innerHTML=ALL_MONTHS.map(m=>
    `<div class="mpill${selMonths.includes(m)?" on":""}" onclick="toggleMonth('${m}')">${m}</div>`
  ).join("");
}

function toggleMonth(m){
  if(selMonths.includes(m)){
    if(selMonths.length<=2)return; // min 2
    selMonths=selMonths.filter(x=>x!==m);
  } else {
    if(selMonths.length>=7)return; // max 7
    selMonths=[...selMonths,m].sort((a,b)=>ALL_MONTHS.indexOf(a)-ALL_MONTHS.indexOf(b));
  }
  initMonthPills();
  render();
}

// ── City select init ───────────────────────────────────────────────────────
function initCitySelect(){
  const ge=document.getElementById("grp-existing");
  const gx=document.getElementById("grp-expansion");
  EXISTING.forEach(c=>{
    if(!Object.values(D).some(m=>m[c]))return;
    const opt=document.createElement("option");
    opt.value=c; opt.textContent=c;
    if(c===curCity)opt.selected=true;
    ge.appendChild(opt);
  });
  EXPANSION.forEach(c=>{
    if(!Object.values(D).some(m=>m[c]))return;
    const opt=document.createElement("option");
    opt.value=c; opt.textContent=c;
    if(c===curCity)opt.selected=true;
    gx.appendChild(opt);
  });
}

function onCityChange(){
  curCity=document.getElementById("citySelect").value;
  drillType=null; funnelView="pct"; expandedRows={};
  if(curTab==="drill")curTab="summary";
  render();
}

function showTab(t){
  curTab=t; drillType=null; funnelView="pct"; expandedRows={};
  document.querySelectorAll(".tab").forEach((b,i)=>{
    b.classList.toggle("on",["summary","charts","salesorg","insights","compare"][i]===t);
  });
  render();
}
function showDrill(type){drillType=type;curTab="drill";expandedRows={};render();}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  killAll();
  const cnt=document.getElementById("content");
  const latM=selMonths[selMonths.length-1];
  const prevM=selMonths.length>=2?selMonths[selMonths.length-2]:null;
  const data=gd(curCity,latM);
  const prev=prevM?gd(curCity,prevM):null;

  if(curTab==="summary")cnt.innerHTML=buildSummary(data,prev,latM,prevM);
  else if(curTab==="charts")cnt.innerHTML=buildCharts();
  else if(curTab==="drill")cnt.innerHTML=buildDrill(data,prev,latM,prevM);
  else if(curTab==="salesorg")cnt.innerHTML=buildSalesOrg(latM,prevM);
  else if(curTab==="insights")cnt.innerHTML=buildInsights(data,prev,latM,prevM);
  else if(curTab==="compare")cnt.innerHTML=buildCompare();

  setTimeout(()=>{
    if(curTab==="summary")drawSummaryCharts(data,prev,latM,prevM);
    else if(curTab==="charts")drawAllCharts(latM,prevM);
  },40);
}

// ── CAC Analysis Insights (per skill) ────────────────────────────────────
function computeSummaryInsights(city,data,prev,latM,prevM){
  // Returns {mkt:{cac,dir,reasons[]}, sales:{cac,dir,reasons[]}, hc:{reasons[]}, sev}
  if(!data||!prev) return null;
  const CH_LIST=["Digital","Referral","SolarPro","BTL Activity","IVR Activity"];

  function v_(k,d){return d?.[k]||0;}
  function pct_(a,b){return(!b||b===0)?null:(a-b)/b*100;}
  function p2_(v){return v===null?"":(v>0?"+":"")+v.toFixed(1)+"%";}
  function conv_(h,m){return m>0?h/m*100:null;}
  function bqlMd_(md,bql){return bql>0?md/bql*100:null;}
  function bqlH_(h,bql){return bql>0?h/bql*100:null;}

  const tc=pct_(data.total_cac,prev.total_cac);
  const mc=pct_(data.mkt_cac,prev.mkt_cac);
  const sc=pct_(data.sales_cac,prev.sales_cac);
  const sev=tc===null?"s":tc>=15?"c":tc>=5?"w":"s";

  // ── Marketing reasons ──────────────────────────────────────────────────
  const mktReasons=[];
  // Find the top 3 channel-level causes driving Mktg CAC
  const mktSignals=[];
  CH_LIST.forEach(ch=>{
    const mk="mkt_cac_"+ch;
    const mv=v_(mk,data), pmv=v_(mk,prev);
    if(!mv&&!pmv) return;
    const hv=v_("hoto_"+ch,data), phv=v_("hoto_"+ch,prev);
    const mdv=v_("md_"+ch,data), pmdv=v_("md_"+ch,prev);
    const bqlv=v_("bql_"+ch,data), pbqlv=v_("bql_"+ch,prev);
    const chCac=pct_(mv,pmv);
    const conv=conv_(hv,mdv), pconv=conv_(phv,pmdv);
    const bqlMd=bqlMd_(mdv,bqlv), pbqlMd=bqlMd_(pmdv,pbqlv);
    const bqlH=bqlH_(hv,bqlv), pbqlH=bqlH_(phv,pbqlv);
    const hc=phv>0?pct_(hv,phv):null;

    let parts=[];
    // Only flag metrics moving in the WRONG direction
    if(conv!==null&&pconv!==null&&conv<pconv-2)
      parts.push(`conv ${pconv.toFixed(1)}%→${conv.toFixed(1)}%`);
    if(bqlMd!==null&&pbqlMd!==null&&bqlMd<pbqlMd-3)
      parts.push(`BQL→FMD ${pbqlMd.toFixed(1)}%→${bqlMd.toFixed(1)}%`);
    if(bqlH!==null&&pbqlH!==null&&bqlH<pbqlH-2)
      parts.push(`BQL→HoTo ${pbqlH.toFixed(1)}%→${bqlH.toFixed(1)}%`);
    if(hc!==null&&hc<=-10)
      parts.push(`HoTo ${phv}→${hv} (${p2_(hc)})`);
    if(ch==="BTL Activity"&&data.hc_btl&&prev.hc_btl){
      const btlChg=pct_(data.hc_btl,prev.hc_btl);
      if(btlChg!==null&&btlChg>=10)  // headcount going UP is bad for cost
        parts.push(`headcount ${Math.round(prev.hc_btl)}→${Math.round(data.hc_btl)} (+${btlChg.toFixed(0)}%)`);
    }
    if(ch==="Digital"){
      const dmCost=v_("mkt_cost_digital_dm",data), pdmCost=v_("mkt_cost_digital_dm",prev);
      const cpbql=bqlv>0?dmCost/bqlv:null, pcpbql=pbqlv>0?pdmCost/pbqlv:null;
      if(cpbql&&pcpbql&&cpbql>pcpbql*1.05)  // CPBQL going up is bad
        parts.push(`CPBQL ₹${Math.round(pcpbql)}→₹${Math.round(cpbql)}`);
    }

    // Only include if CAC went UP and there are bad signals to explain it
    if(chCac!==null&&chCac>=5&&parts.length>0){
      mktSignals.push({ch, chCac, mv, pmv, parts, score:chCac});
    } else if(chCac!==null&&chCac>=10&&parts.length===0){
      // CAC rose but no single metric to blame — still show
      if(hc!==null&&hc<0) parts.push(`HoTo ${phv}→${hv}`);
      mktSignals.push({ch, chCac, mv, pmv, parts, score:chCac});
    }
  });

  mktSignals.sort((a,b)=>b.score-a.score);
  mktSignals.slice(0,3).forEach(({ch,chCac,mv,pmv,parts})=>{
    const dir=chCac>0?"up":"down";
    const base=`${ch} CAC ${dir} from ₹${Math.round(pmv)} to ₹${Math.round(mv)} (${p2_(chCac)})`;
    const why=parts.length>0?` — ${parts.join(", ")}`:` — HoTo: ${v_("hoto_"+ch,data)}`;
    mktReasons.push(base+why);
  });
  if(mktReasons.length===0&&mc!==null&&Math.abs(mc)>=3){
    // Overall cost movement
    const totConv=data.md_total>0?(data.hoto_total/data.md_total*100):0;
    const prevTotConv=prev.md_total>0?(prev.hoto_total/prev.md_total*100):0;
    if(Math.abs(totConv-prevTotConv)>=2)
      mktReasons.push(`Overall conversion moved from ${prevTotConv.toFixed(1)}% to ${totConv.toFixed(1)}%`);
    const bqlh=data.bql_total>0?(data.hoto_total/data.bql_total*100):0;
    const pbqlh=prev.bql_total>0?(prev.hoto_total/prev.bql_total*100):0;
    if(Math.abs(bqlh-pbqlh)>=2)
      mktReasons.push(`BQL to HoTo moved from ${pbqlh.toFixed(1)}% to ${bqlh.toFixed(1)}%`);
  }

  // ── Sales reasons ───────────────────────────────────────────────────────
  const salesReasons=[];
  // 1. Headcount (primary driver for Sales CAC)
  const scH=data.hc_sc||0, pscH=prev.hc_sc||0;
  const scChg=pct_(scH,pscH);
  if(scChg!==null&&Math.abs(scChg)>=5)
    salesReasons.push(`Active SC headcount ${scChg>0?"increased":"decreased"} from ${Math.round(pscH)} to ${Math.round(scH)} (${p2_(scChg)})`);
  const btlH=data.hc_btl||0, pbtlH=prev.hc_btl||0;
  const btlChg=pct_(btlH,pbtlH);
  if(btlChg!==null&&Math.abs(btlChg)>=10)
    salesReasons.push(`BTL headcount moved from ${Math.round(pbtlH)} to ${Math.round(btlH)} (${p2_(btlChg)})`);
  const lrmH=data.hc_lrm||0, plrmH=prev.hc_lrm||0;
  const lrmChg=pct_(lrmH,plrmH);
  if(lrmChg!==null&&Math.abs(lrmChg)>=15)
    salesReasons.push(`LRM headcount moved from ${Math.round(plrmH)} to ${Math.round(lrmH)} (${p2_(lrmChg)})`);
  if(data.hc_resigned>=3)
    salesReasons.push(`${Math.round(data.hc_resigned)} resignations this month`);

  // 2. Channel conversions driving Sales CAC
  const salesCacSignals=[];
  CH_LIST.forEach(ch=>{
    const sk=sKey(ch), sv=v_(sk,data), psv=v_(sk,prev);
    if(!sv&&!psv) return;
    const hv=v_("hoto_"+ch,data), phv=v_("hoto_"+ch,prev);
    const mdv=v_("md_"+ch,data), pmdv=v_("md_"+ch,prev);
    const bqlv=v_("bql_"+ch,data), pbqlv=v_("bql_"+ch,prev);
    const chSc=pct_(sv,psv);
    const conv=conv_(hv,mdv), pconv=conv_(phv,pmdv);
    const bqlMd=bqlMd_(mdv,bqlv), pbqlMd=bqlMd_(pmdv,pbqlv);
    const parts=[];
    // Only wrong-direction metrics
    if(conv!==null&&pconv!==null&&conv<pconv-2)
      parts.push(`conv ${pconv.toFixed(1)}%→${conv.toFixed(1)}%`);
    if(bqlMd!==null&&pbqlMd!==null&&bqlMd<pbqlMd-3)
      parts.push(`BQL→FMD ${pbqlMd.toFixed(1)}%→${bqlMd.toFixed(1)}%`);
    // Only show channels where Sales CAC went UP
    if(chSc!==null&&chSc>=10&&parts.length>0)
      salesCacSignals.push({ch, chSc, sv, psv, parts, score:chSc});
    else if(chSc!==null&&chSc>=15&&parts.length===0)
      salesCacSignals.push({ch, chSc, sv, psv, parts:[`HoTo ${phv}→${hv}`], score:chSc});
  });

  salesCacSignals.sort((a,b)=>b.score-a.score);
  salesCacSignals.slice(0,2).forEach(({ch,chSc,sv,psv,parts})=>{
    const dir=chSc>0?"up":"down";
    salesReasons.push(`${ch} Sales CAC ${dir} from ₹${Math.round(psv)} to ₹${Math.round(sv)} (${p2_(chSc)}) — ${parts.join(", ")}`);
  });

  // ── Headcount reasons (standalone) ────────────────────────────────────
  const hcReasons=[];
  if(scChg!==null&&Math.abs(scChg)>=15)
    hcReasons.push(`Active SC: ${Math.round(pscH)}→${Math.round(scH)} (${p2_(scChg)})`);
  if(btlChg!==null&&Math.abs(btlChg)>=20)
    hcReasons.push(`BTL: ${Math.round(pbtlH)}→${Math.round(btlH)} (${p2_(btlChg)})`);
  if(data.hc_resigned>=4)
    hcReasons.push(`${Math.round(data.hc_resigned)} resignations`);

  return {
    sev, tc, mc, sc,
    mkt:{cac:data.mkt_cac, prev:prev.mkt_cac, chg:mc, reasons:mktReasons},
    sales:{cac:data.sales_cac, prev:prev.sales_cac, chg:sc, reasons:salesReasons},
    hc:hcReasons,
    latM, prevM
  };
}

// ── Summary Tab ───────────────────────────────────────────────────────────
function buildSummary(data,prev,latM,prevM){
  if(!data||!data.mkt_cac)return`<div style="padding:20px;color:#888">No data for ${curCity} in ${latM}</div>`;
  const ins=computeSummaryInsights(curCity,data,prev,latM,prevM);
  const sevCls=ins?ins.sev:"s";
  const sevTxt=sevCls==="c"?"🔴 CRITICAL":sevCls==="w"?"🟡 WATCH":"🟢 STABLE";
  const badge=`<span class="sev ${sevCls}">${sevTxt}</span>`;

  const tc=pct(data.total_cac,prev?.total_cac);
  const conv=data.md_total>0?(data.hoto_total/data.md_total*100):0;
  const bqlh=data.bql_total>0?(data.hoto_total/data.bql_total*100):0;

  const bqlMd=data.bql_total>0?(data.md_total/data.bql_total*100):0;

  const kpi=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">

    <div style="font-size:10px;color:#7090b0">vs ${prevM||"—"}</div>
  </div>
  <div class="mg">
    <div class="mc">
      <div class="ml">Marketing CAC</div>
      <div class="mv">₹${fmt(data.mkt_cac)}</div>
      ${prev?`<div class="ms ${clr(mc)}">${arr(mc)} ${Math.abs(mc||0).toFixed(1)}% vs ${prevM}</div>`:""}
      <div class="ml" style="margin-top:5px">Sales CAC</div>
      <div style="font-size:14px;font-weight:700;color:#0c2461">₹${fmt(data.sales_cac)}</div>
      ${prev?`<div class="ms ${clr(sc)}">${arr(sc)} ${Math.abs(sc||0).toFixed(1)}% vs ${prevM}</div>`:""}
    </div>
    <div class="mc">
      <div class="ml">Total CAC</div>
      <div class="mv">₹${fmt(data.total_cac)}</div>
      ${prev?`<div class="ms ${clr(tc)}">${arr(tc)} ${Math.abs(tc||0).toFixed(1)}% vs ${prevM}</div>`:""}
    </div>
    <div class="mc">
      <div class="ml">Conversion (HoTo/FMD)</div><div class="mv">${conv.toFixed(1)}%</div>
      <div class="ml" style="margin-top:4px">BQL→HoTo</div>
      <div style="font-size:14px;font-weight:700;color:#0c2461">${bqlh.toFixed(1)}%</div>
      <div class="ml" style="margin-top:4px">BQL→FMD</div>
      <div style="font-size:14px;font-weight:700;color:#0c2461">${bqlMd.toFixed(1)}%</div>
    </div>
    <div class="mc">
      <div class="ml">HoTo</div>
      <div class="mv">${fmt(data.hoto_total)}</div>
      ${prev?`<div class="ms ${clr(pct(data.hoto_total,prev.hoto_total),true)}">${arr(pct(data.hoto_total,prev.hoto_total))} ${Math.abs(pct(data.hoto_total,prev.hoto_total)||0).toFixed(1)}% vs ${prevM}</div>`:""}
    </div>
  </div>`;

  // ── CAC Summary table + Conversion table side by side ──
  const SM = selMonths;
  // CAC table (left)
  function cacChRows(isMkt){
    return CH.map(ch=>{
      const k=isMkt?"mkt_cac_"+ch:sKey(ch);
      const tl=`<td class="tl"><span class="exp-btn" onclick="toggleExp('${k}')">${expandedRows[k]?"▾":"▸"}</span>${ch}</td>`;
      const cells=SM.map((m,i)=>{
        const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;
        const v=d?.[k],pv=p?.[k];
        const hl=hlCac(v,pv);
        return`<td class="${hl}">${fmt(v)}</td>`;
      }).join("");
      let subRows="";
      if(expandedRows[k]){
        const subDefs=isMkt?getSubCACs(ch):[];
        subDefs.forEach(([lbl,subK])=>{
          const sr=SM.map((m,i)=>{
            const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;
            const v=d?.[subK],pv=p?.[subK];
            const hl=hlCac(v,pv);
            return`<td class="${hl}">${fmt(v)||"-"}</td>`;
          }).join("");
          subRows+=`<tr class="expanded-sub"><td class="tl">${lbl}</td>${sr}</tr>`;
        });
      }
      return`<tr class="sr">${tl}${cells}</tr>${subRows}`;
    }).join("");
  }

  const mCacRow=SM.map((m,i)=>{const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;const c=p?pct(d?.mkt_cac,p?.mkt_cac):null;return`<td class="${hlCac(d?.mkt_cac,p?.mkt_cac)}">${fmt(d?.mkt_cac)}</td>`;}).join("");
  const sCacRow=SM.map((m,i)=>{const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;return`<td class="${hlCac(d?.sales_cac,p?.sales_cac)}">${fmt(d?.sales_cac)}</td>`;}).join("");
  const totCacRow=SM.map((m,i)=>{const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;return`<td class="${hlCac(d?.total_cac,p?.total_cac)}">${fmt(d?.total_cac)}</td>`;}).join("");

  const cacTable=`<div class="sx"><table>
    <thead><tr><th class="tl" style="min-width:130px">${curCity}</th>${SM.map(m=>`<th>${m}</th>`).join("")}</tr></thead>
    <tbody>
    <tr><td class="tl">No of HoTos</td>${SM.map((m,i)=>{const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;return`<td class="${hlHoto(d?.hoto_total,p?.hoto_total)}">${fmt(d?.hoto_total)}</td>`;}).join("")}</tr>
    <tr class="br"><td class="tl"><span class="cl" onclick="showDrill('mkt')">Marketing CAC</span></td>${mCacRow}</tr>
    ${cacChRows(true)}
    <tr class="br"><td class="tl"><span class="cl" onclick="showDrill('sales')">Sales CAC</span></td>${sCacRow}</tr>
    ${cacChRows(false)}
    <tr class="br"><td class="tl">Total CAC</td>${totCacRow}</tr>
    <tr><td class="tl">Mktg Cost (L)</td>${SM.map((m,i)=>{const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;return`<td class="${hlCac(d?.mkt_cost_total,p?.mkt_cost_total)}">${d?fmtL(d.mkt_cost_total):"-"}</td>`;}).join("")}</tr>
    <tr><td class="tl">Sales Cost (L)</td>${SM.map((m,i)=>{const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;return`<td class="${hlCac(d?.sales_cost_total,p?.sales_cost_total)}">${d?fmtL(d.sales_cost_total):"-"}</td>`;}).join("")}</tr>
    ${gd(curCity,SM[0]).bookings_L!==undefined?`<tr><td class="tl">Bookings (L)</td>${SM.map(m=>{const d=gd(curCity,m);return`<td>${d?.bookings_L?fmt(d.bookings_L):"-"}</td>`;}).join("")}</tr><tr><td class="tl">Total Cost (L)</td>${SM.map(m=>{const d=gd(curCity,m);return`<td>${d?.total_cost_L?d.total_cost_L.toFixed(1):"-"}</td>`;}).join("")}</tr><tr><td class="tl">% of Revenue</td>${SM.map(m=>{const d=gd(curCity,m);return`<td>${d?.pct_revenue?d.pct_revenue.toFixed(2)+"%":"-"}</td>`;}).join("")}</tr>`:""}
    </tbody>
  </table></div>`;

  // ── Conversion table with expandable sub-rows ──
  function convRow(ch){
    const expKey='conv_'+ch;
    const isExp=expandedRows[expKey];
    const pctCells=SM.map((m,i)=>{
      const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;
      const hv=d?.["hoto_"+ch]||0,mdv=d?.["md_"+ch]||0;
      const v=mdv>0?(hv/mdv*100):null;
      const phv=p?.["hoto_"+ch]||0,pmdv=p?.["md_"+ch]||0;
      const pv=pmdv>0?(phv/pmdv*100):null;
      const hl=v&&pv?v<pv-3?"neg":v>pv+3?"pos":"":"";
      return`<td class="${hl}">${v!==null?v.toFixed(1)+"%":"-"}</td>`;
    }).join("");
    let sub="";
    if(isExp){
      // HoTo sub-row
      const hRow=SM.map(m=>{const d=gd(curCity,m);return`<td>${fmt(d?.["hoto_"+ch])}</td>`;}).join("");
      // MD sub-row
      const mRow=SM.map(m=>{const d=gd(curCity,m);return`<td>${fmt(d?.["md_"+ch])}</td>`;}).join("");
      sub=`<tr class="expanded-sub"><td class="tl">&nbsp;&nbsp;&nbsp;HoTo</td>${hRow}</tr>
           <tr class="expanded-sub"><td class="tl">&nbsp;&nbsp;&nbsp;MD</td>${mRow}</tr>`;
    }
    return`<tr class="sr"><td class="tl"><span class="exp-btn" onclick="toggleExp('${expKey}')">${isExp?"▾":"▸"}</span>${ch}</td>${pctCells}</tr>${sub}`;
  }

  const convTable=`<div class="sx"><table>
    <thead><tr><th class="tl">Conversion % <span style="font-size:9px;font-weight:400;color:#8ab4e0">(▸ expand)</span></th>${SM.map(m=>`<th>${m}</th>`).join("")}</tr></thead>
    <tbody>
    ${CH.map(ch=>convRow(ch)).join("")}
    <tr class="br"><td class="tl">Total</td>${SM.map((m,i)=>{
      const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;
      const v=d?.md_total>0?(d.hoto_total/d.md_total*100):null;
      const pv=p?.md_total>0?(p.hoto_total/p.md_total*100):null;
      const hl=v&&pv?v<pv-3?"neg":v>pv+3?"pos":"":"";
      return`<td class="${hl}">${v!==null?v.toFixed(1)+"%":"-"}</td>`;
    }).join("")}</tr>
    </tbody>
  </table></div>`;

  // ── BQL→MD table with expandable sub-rows ──
  function bqlMdRow(ch){
    const expKey='bqlmd_'+ch;
    const isExp=expandedRows[expKey];
    const pctCells=SM.map((m,i)=>{
      const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;
      const bql=d?.["bql_"+ch]||0,md=d?.["md_"+ch]||0;
      const v=bql>0?(md/bql*100):null;
      const pb=p?.["bql_"+ch]||0,pm=p?.["md_"+ch]||0;
      const pv=pb>0?(pm/pb*100):null;
      const hl=v&&pv?v<pv-3?"neg":v>pv+3?"pos":"":"";
      return`<td class="${hl}">${v!==null?v.toFixed(1)+"%":"-"}</td>`;
    }).join("");
    let sub="";
    if(isExp){
      const mRow=SM.map(m=>{const d=gd(curCity,m);return`<td>${fmt(d?.["md_"+ch])}</td>`;}).join("");
      const bRow=SM.map(m=>{const d=gd(curCity,m);return`<td>${fmt(d?.["bql_"+ch])}</td>`;}).join("");
      sub=`<tr class="expanded-sub"><td class="tl">&nbsp;&nbsp;&nbsp;MD</td>${mRow}</tr>
           <tr class="expanded-sub"><td class="tl">&nbsp;&nbsp;&nbsp;BQL</td>${bRow}</tr>`;
    }
    return`<tr class="sr"><td class="tl"><span class="exp-btn" onclick="toggleExp('${expKey}')">${isExp?"▾":"▸"}</span>${ch}</td>${pctCells}</tr>${sub}`;
  }

  const bqlMdTable=`<div class="sx" style="margin-top:6px"><table>
    <thead><tr><th class="tl">BQL→MD % <span style="font-size:9px;font-weight:400;color:#8ab4e0">(▸ expand)</span></th>${SM.map(m=>`<th>${m}</th>`).join("")}</tr></thead>
    <tbody>
    ${CH.map(ch=>bqlMdRow(ch)).join("")}
    <tr class="br"><td class="tl">Total</td>${SM.map((m,i)=>{
      const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;
      const v=d?.bql_total>0?(d.md_total/d.bql_total*100):null;
      const pv=p?.bql_total>0?(p.md_total/p.bql_total*100):null;
      const hl=v&&pv?v<pv-3?"neg":v>pv+3?"pos":"":"";
      return`<td class="${hl}">${v!==null?v.toFixed(1)+"%":"-"}</td>`;
    }).join("")}</tr>
    </tbody>
  </table></div>`;

  // ── BQL→HoTo table builder (with expand) ──
  function buildBqlHotoTable(city,SM){
    function bqlHRow(ch){
      const expKey='bqlh_'+ch;
      const isExp=expandedRows[expKey];
      const pctCells=SM.map((m,i)=>{
        const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;
        const b=d?.["bql_"+ch]||0,h=d?.["hoto_"+ch]||0;
        const v=b>0?(h/b*100):null;
        const pb=p?.["bql_"+ch]||0,ph=p?.["hoto_"+ch]||0;
        const pv=pb>0?(ph/pb*100):null;
        const hl=v&&pv?v<pv-3?"neg":v>pv+3?"pos":"":"";
        return`<td class="${hl}">${v!==null?v.toFixed(1)+"%":"-"}</td>`;
      }).join("");
      let sub="";
      if(isExp){
        const hRow=SM.map(m=>{const d=gd(city,m);return`<td>${fmt(d?.["hoto_"+ch])}</td>`;}).join("");
        const bRow=SM.map(m=>{const d=gd(city,m);return`<td>${fmt(d?.["bql_"+ch])}</td>`;}).join("");
        sub=`<tr class="expanded-sub"><td class="tl">&nbsp;&nbsp;&nbsp;HoTo</td>${hRow}</tr>
             <tr class="expanded-sub"><td class="tl">&nbsp;&nbsp;&nbsp;BQL</td>${bRow}</tr>`;
      }
      return`<tr class="sr"><td class="tl"><span class="exp-btn" onclick="toggleExp('${expKey}')">${isExp?"▾":"▸"}</span>${ch}</td>${pctCells}</tr>${sub}`;
    }
    const totRow=SM.map((m,i)=>{
      const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;
      const v=d?.bql_total>0?(d.hoto_total/d.bql_total*100):null;
      const pv=p?.bql_total>0?(p.hoto_total/p.bql_total*100):null;
      const hl=v&&pv?v<pv-3?"neg":v>pv+3?"pos":"":"";
      return`<td class="${hl}">${v!==null?v.toFixed(1)+"%":"-"}</td>`;
    }).join("");
    return`<table><thead><tr><th class="tl">BQL→HoTo % <span style="font-size:9px;font-weight:400;color:#8ab4e0">(▸ expand)</span></th>${SM.map(m=>`<th>${m}</th>`).join("")}</tr></thead>
      <tbody>${CH.map(ch=>bqlHRow(ch)).join("")}
      <tr class="br"><td class="tl">Total</td>${totRow}</tr></tbody></table>`;
  }

  // ── MD (First Meeting Done) absolute table ──
  function buildMDTable(city,SM){
    const chRows=CH.map(ch=>`<tr class="sr"><td class="tl">${ch}</td>${SM.map((m,i)=>{
      const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;
      const v=d?.["md_"+ch],pv=p?.["md_"+ch];
      const hl=v&&pv?pct(v,pv)<-10?"neg":pct(v,pv)>10?"pos":"":"";
      return`<td class="${hl}">${fmt(v)}</td>`;
    }).join("")}</tr>`).join("");
    const totRow=SM.map((m,i)=>{
      const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;
      const hl=d?.md_total&&p?.md_total?pct(d.md_total,p.md_total)<-10?"neg":pct(d.md_total,p.md_total)>10?"pos":"":"";
      return`<td class="${hl}">${fmt(d?.md_total)}</td>`;
    }).join("");
    return`<table><thead><tr><th class="tl">First Meeting Done</th>${SM.map(m=>`<th>${m}</th>`).join("")}</tr></thead>
      <tbody>${chRows}<tr class="br"><td class="tl">Total</td>${totRow}</tr></tbody></table>`;
  }

  const mktCostTable=buildMktCostTable(curCity,SM);
  const bqlHotoTable=buildBqlHotoTable(curCity,SM);
  const mdTable=buildMDTable(curCity,SM);

  // Headcount table (replaces mini charts in summary)

function buildMktCostTable(city,SM){
  function chCostKey(ch){return "mkt_cost_"+ch;}
  const chRows=CH.map(ch=>{
    const k=chCostKey(ch);
    const totRow=`<tr class="br"><td class="tl">${ch}</td>${SM.map((m,i)=>{const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;return`<td class="${hlCac(d?.[k],p?.[k])}">${d?fmtL(d[k]):"-"}L</td>`;}).join("")}</tr>`;
    const subDefs=ch==="Digital"?[["  DM Spends","mkt_cost_digital_dm"],["  SIQ Spend","mkt_cost_digital_siq"],["  Pre Design","mkt_cost_digital_pre"]]:
      ch==="Referral"?[["  Referral Comm","mkt_cost_ref_comm"],["  Pre Design","mkt_cost_ref_pre"]]:
      ch==="SolarPro"?[["  SolarPro Comm","mkt_cost_sp_comm"],["  Pre Design","mkt_cost_sp_pre"]]:
      ch==="BTL Activity"?[["  BTL Team Cost","mkt_cost_btl_team"],["  SIQ","mkt_cost_btl_siq"],["  Pre Design","mkt_cost_btl_pre"]]:
      [["  IVR Cost","mkt_cost_ivr_cost"],["  SIQ","mkt_cost_ivr_siq"],["  Pre Design","mkt_cost_ivr_pre"]];
    const subRows=subDefs.map(([l,sk])=>`<tr class="sr2"><td class="tl">${l}</td>${SM.map((m,i)=>{const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;const v=d?.[sk];return`<td class="${hlCac(v,p?.[sk])}">${v?fmtL(v)+"L":"-"}</td>`;}).join("")}</tr>`).join("");
    return totRow+subRows;
  }).join("");
  const totRow=`<tr class="tot-row"><td class="tl">Total Mktg Cost</td>${SM.map((m,i)=>{const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;return`<td class="${hlCac(d?.mkt_cost_total,p?.mkt_cost_total)}">${d?fmtL(d.mkt_cost_total)+"L":"-"}</td>`;}).join("")}</tr>`;
  return`<table><thead><tr><th class="tl">Channel / Component</th>${SM.map(m=>`<th>${m}</th>`).join("")}</tr></thead><tbody>${chRows}${totRow}</tbody></table>`;
}

function buildBqlHotoTable(city,SM){
  const rows=CH.map(ch=>{
    const cells=SM.map((m,i)=>{
      const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;
      const b=d?.["bql_"+ch]||0, h=d?.["hoto_"+ch]||0;
      const v=b>0?(h/b*100):null;
      const pb=p?.["bql_"+ch]||0, ph=p?.["hoto_"+ch]||0;
      const pv=pb>0?(ph/pb*100):null;
      const hl=v&&pv&&v<pv-3?"neg":v&&pv&&v>pv+3?"pos":"";
      return`<td class="${hl}">${v!==null?v.toFixed(1)+"%":"-"}</td>`;
    }).join("");
    return`<tr class="sr"><td class="tl">${ch}</td>${cells}</tr>`;
  }).join("");
  const totRow=SM.map((m,i)=>{
    const d=gd(city,m),p=i>0?gd(city,SM[i-1]):null;
    const v=d?.bql_total>0?(d.hoto_total/d.bql_total*100):null;
    const pv=p?.bql_total>0?(p.hoto_total/p.bql_total*100):null;
    const hl=v&&pv&&v<pv-3?"neg":v&&pv&&v>pv+3?"pos":"";
    return`<td class="${hl}">${v!==null?v.toFixed(1)+"%":"-"}</td>`;
  }).join("");
  return`<table><thead><tr><th class="tl">BQL→HoTo %</th>${SM.map(m=>`<th>${m}</th>`).join("")}</tr></thead><tbody>${rows}<tr class="br"><td class="tl">Total</td>${totRow}</tr></tbody></table>`;
}

function buildInsights(data,prev,latM,prevM){
  if(!data||!data.mkt_cac)return`<div style="padding:20px;color:#888">No data for ${curCity}</div>`;
  const tc=pct(data.total_cac,prev?.total_cac);
  const sev=tc===null?"s":tc>=15?"c":tc>=5?"w":"s";
  const badge=`<span class="sev ${sev}">${sev==="c"?"🔴 CRITICAL":sev==="w"?"🟡 WATCH":"🟢 STABLE"} — ${curCity} | ${prevM}→${latM}</span>`;

  // 6-month metric table
  const SM=selMonths;
  const metricRows=[
    ["Total CAC","total_cac","cac"],["Marketing CAC","mkt_cac","cac"],["Sales CAC","sales_cac","cac"],
    ["HoTo","hoto_total","hoto"],["Conversion (HoTo/FMD)",null,"conv"],["BQL→MD %",null,"bqlmd"],["BQL→HoTo %",null,"bqlh"]
  ].map(([lbl,key,type])=>{
    const cells=SM.map((m,i)=>{
      const d=gd(curCity,m),p=i>0?gd(curCity,SM[i-1]):null;
      let v,pv;
      if(type==="conv"){v=d?.md_total>0?(d.hoto_total/d.md_total*100):null;pv=p?.md_total>0?(p.hoto_total/p.md_total*100):null;}
      else if(type==="bqlmd"){v=d?.bql_total>0?(d.md_total/d.bql_total*100):null;pv=p?.bql_total>0?(p.md_total/p.bql_total*100):null;}
      else if(type==="bqlh"){v=d?.bql_total>0?(d.hoto_total/d.bql_total*100):null;pv=p?.bql_total>0?(p.hoto_total/p.bql_total*100):null;}
      else{v=d?.[key];pv=p?.[key];}
      const isCac=type==="cac";const isConv=["conv","bqlmd","bqlh"].includes(type);const isHoto=type==="hoto";
      const hl=v&&pv?(isCac?hlCac(v,pv):isHoto?hlHoto(v,pv):isConv&&v<pv-2?"neg":isConv&&v>pv+2?"pos":""):"";
      const disp=isConv?v!==null?v.toFixed(1)+"%":"-":type==="cac"?"₹"+fmt(v):fmt(v);
      const chg=v&&pv?`<br><span style="font-size:9px;color:#6a80a0">${p2(pct(v,pv))}</span>`:"";
      return`<td class="${hl}">${disp}${chg}</td>`;
    }).join("");
    return`<tr${["Total CAC","HoTo"].includes(lbl)?' class="br"':''}><td class="tl">${lbl}</td>${cells}</tr>`;
  }).join("");
  const metricsTable=`<div class="card sx" style="margin-bottom:9px"><table>
    <thead><tr><th class="tl">Metric</th>${SM.map(m=>`<th>${m}</th>`).join("")}</tr></thead>
    <tbody>${metricRows}</tbody></table></div>`;

  if(!prev) return`${badge}<div style="margin-top:7px">${metricsTable}<div class="card" style="padding:12px;color:#888">Prior month data not available for diagnosis.</div></div>`;

  // ── Helpers ──────────────────────────────────────────────────────────────
  function v_(k,d2){return d2?.[k]||0;}
  function conv_(h,m2){return m2>0?h/m2*100:null;}
  function bqlMd_(md,bql){return bql>0?md/bql*100:null;}
  function bqlH_(h,bql){return bql>0?h/bql*100:null;}
  function cpbql_(cost,bql){return bql>0?cost/bql:null;}
  function d2s(prev_v,cur_v,prefix="₹",suffix="",dec=0){
    if(!prev_v&&!cur_v)return"-";
    const f=v=>dec>0?Number(v).toFixed(dec):fmt(v);
    const c=pct(cur_v,prev_v);
    return`${prefix}${f(prev_v)}${suffix}→${prefix}${f(cur_v)}${suffix}${c!==null?" ("+p2(c)+")":""}`;
  }
  function dL(pv,cv){return d2s(pv/100000,cv/100000,"₹","L",1);}
  function sig(txt){return`<div class="ins-line sig">🔴 ${txt}</div>`;}
  function diag(txt){return`<div class="ins-line diag">🔍 ${txt}</div>`;}
  function note(txt){return`<div class="ins-line impl">📌 ${txt}</div>`;}

  // ── Marketing channel diagnosis (per skill: lead with CAC, then causes) ──
  const CH_LIST=["Digital","Referral","SolarPro","BTL Activity","IVR Activity"];
  const mktCh=[];

  CH_LIST.forEach(ch=>{
    const mk="mkt_cac_"+ch;
    const mv=v_(mk,data), pmv=v_(mk,prev);
    if(!mv&&!pmv) return;

    const hv=v_("hoto_"+ch,data), phv=v_("hoto_"+ch,prev);
    const mdv=v_("md_"+ch,data), pmdv=v_("md_"+ch,prev);
    const bqlv=v_("bql_"+ch,data), pbqlv=v_("bql_"+ch,prev);

    const mc=pmv?pct(mv,pmv):null;
    const hc=phv>0?pct(hv,phv):null;
    const conv=conv_(hv,mdv), pconv=conv_(phv,pmdv);
    const bqlMd=bqlMd_(mdv,bqlv), pbqlMd=bqlMd_(pmdv,pbqlv);
    const bqlH=bqlH_(hv,bqlv), pbqlH=bqlH_(phv,pbqlv);

    if(!mv&&!phv&&!hv) return;

    const lines=[];

    // ── 1. Lead with CAC movement ──
    if(mc!==null&&Math.abs(mc)>=5){
      const dir=mc>0?"increased":"decreased";
      lines.push(sig(`Mktg CAC ${dir} from ₹${fmt(pmv)} to ₹${fmt(mv)} (${p2(mc)})`));
    }

    // ── 2. Conversion — always first cause metric ──
    if(pconv!==null&&conv!==null&&Math.abs(conv-pconv)>=2){
      const dir=conv<pconv?"fell":"rose";
      lines.push(diag(`Conversion (HoTo/FMD) ${dir} from ${pconv.toFixed(1)}% to ${conv.toFixed(1)}%`));
    }

    // ── 3. HoTo volume ──
    if(phv>0&&hc!==null&&hc<=-20)
      lines.push(sig(`HoTo dropped from ${phv} to ${hv} (${p2(hc)})`));
    else if(phv>0&&hc!==null&&Math.abs(hc)>=5)
      lines.push(diag(`HoTo moved from ${phv} to ${hv} (${p2(hc)})`));

    // ── 4. Channel-specific metrics ──
    if(ch==="Digital"){
      // CPBQL = DM Spends ÷ BQL
      const dmCost=v_("mkt_cost_digital_dm",data), pdmCost=v_("mkt_cost_digital_dm",prev);
      const cpbql=cpbql_(dmCost,bqlv), pcpbql=cpbql_(pdmCost,pbqlv);
      if(cpbql&&pcpbql&&Math.abs(pct(cpbql,pcpbql))>=5){
        const dir=cpbql>pcpbql?"increased":"decreased";
        lines.push(diag(`CPBQL ${dir} from ₹${fmt(pcpbql)} to ₹${fmt(cpbql)} (${p2(pct(cpbql,pcpbql))}) — DM spends ÷ BQL`));
      }
      if(pbqlMd!==null&&bqlMd!==null&&Math.abs(bqlMd-pbqlMd)>=3){
        const dir=bqlMd<pbqlMd?"dropped":"improved";
        lines.push(diag(`BQL to FMD ${dir} from ${pbqlMd.toFixed(1)}% to ${bqlMd.toFixed(1)}%`));
      }
      if(pbqlv>0&&Math.abs(pct(bqlv,pbqlv))>=10){
        const dir=bqlv<pbqlv?"fell":"rose";
        lines.push(diag(`BQL ${dir} from ${pbqlv} to ${bqlv} (${p2(pct(bqlv,pbqlv))})`));
      }
      if(dmCost&&pdmCost&&Math.abs(pct(dmCost,pdmCost))>=5){
        const dir=dmCost>pdmCost?"increased":"decreased";
        lines.push(diag(`DM Spends ${dir} from ${dL(pdmCost,dmCost).split("→")[0].trim()} to ${dL(pdmCost,dmCost).split("→")[1].split(" ")[0].trim()} (${p2(pct(dmCost,pdmCost))})`));
      }
    }

    if(ch==="Referral"){
      if(pbqlMd!==null&&bqlMd!==null&&Math.abs(bqlMd-pbqlMd)>=3){
        const dir=bqlMd<pbqlMd?"dropped":"improved";
        lines.push(diag(`BQL to FMD ${dir} from ${pbqlMd.toFixed(1)}% to ${bqlMd.toFixed(1)}%`));
      }
      if(pbqlv>0&&Math.abs(pct(bqlv,pbqlv))>=10){
        lines.push(diag(`BQL moved from ${pbqlv} to ${bqlv} (${p2(pct(bqlv,pbqlv))})`));
      }
      const rc=v_("mkt_cost_ref_comm",data), prc=v_("mkt_cost_ref_comm",prev);
      if(rc&&prc&&Math.abs(pct(rc,prc))>=5)
        lines.push(diag(`Referral commission moved ${p2(pct(rc,prc))} (tied to BQL volume)`));
    }

    if(ch==="SolarPro"){
      if(pbqlH!==null&&bqlH!==null&&Math.abs(bqlH-pbqlH)>=2){
        const dir=bqlH<pbqlH?"dropped":"improved";
        lines.push(diag(`BQL to HoTo ${dir} from ${pbqlH.toFixed(1)}% to ${bqlH.toFixed(1)}%`));
      }
      if(phv>0&&hv<phv*0.8)
        lines.push(note(`SolarPro HoTo dropped from ${phv} to ${hv} — partner channel volume`));
      const spc=v_("mkt_cost_sp_comm",data), pspc=v_("mkt_cost_sp_comm",prev);
      if(spc&&pspc&&Math.abs(pct(spc,pspc))>=5)
        lines.push(diag(`SolarPro commission moved ${p2(pct(spc,pspc))} — directly tied to HoTo volume`));
    }

    if(ch==="BTL Activity"){
      // Skill: BTL → Conversion → Headcount MoM → cost impact (no HoTo/head stat)
      const btlHc=v_("hc_btl",data), pbtlHc=v_("hc_btl",prev);
      if(btlHc&&pbtlHc&&Math.abs(pct(btlHc,pbtlHc))>=10){
        const dir=btlHc>pbtlHc?"increased":"decreased";
        lines.push(diag(`BTL team headcount ${dir} from ${pbtlHc} to ${btlHc} (${p2(pct(btlHc,pbtlHc))})`));
      }
      if(pbqlH!==null&&bqlH!==null&&Math.abs(bqlH-pbqlH)>=2){
        const dir=bqlH<pbqlH?"dropped":"improved";
        lines.push(diag(`BQL to HoTo ${dir} from ${pbqlH.toFixed(1)}% to ${bqlH.toFixed(1)}%`));
      }
      const btlC=v_("mkt_cost_btl_team",data), pbtlC=v_("mkt_cost_btl_team",prev);
      if(btlC&&pbtlC&&Math.abs(pct(btlC,pbtlC))>=5){
        const dir=btlC>pbtlC?"increased":"decreased";
        lines.push(diag(`BTL team cost ${dir} by ${p2(pct(btlC,pbtlC))} — reflects headcount change`));
      }
    }

    if(ch==="IVR Activity"){
      if(pbqlH!==null&&bqlH!==null&&Math.abs(bqlH-pbqlH)>=2){
        const dir=bqlH<pbqlH?"dropped":"improved";
        lines.push(diag(`BQL to HoTo ${dir} from ${pbqlH.toFixed(1)}% to ${bqlH.toFixed(1)}%`));
      }
      if(pbqlMd!==null&&bqlMd!==null&&Math.abs(bqlMd-pbqlMd)>=3){
        const dir=bqlMd<pbqlMd?"dropped":"improved";
        lines.push(diag(`BQL to FMD ${dir} from ${pbqlMd.toFixed(1)}% to ${bqlMd.toFixed(1)}%`));
      }
      const ivrC=v_("mkt_cost_ivr_cost",data), pivrC=v_("mkt_cost_ivr_cost",prev);
      if(ivrC&&pivrC&&Math.abs(pct(ivrC,pivrC))>=5)
        lines.push(diag(`IVR cost moved ${p2(pct(ivrC,pivrC))}`));
    }

    if(lines.length>0) mktCh.push({ch,mv,pmv,mc,hv,phv,conv,pconv,lines});
  });

  // ── Sales channel diagnosis (headcount → conversions → cost movement) ──
  const salesCh=[];

  CH_LIST.forEach(ch=>{
    const sk=sKey(ch), sv=v_(sk,data), psv=v_(sk,prev);
    if(!sv&&!psv) return;

    const hv=v_("hoto_"+ch,data), phv=v_("hoto_"+ch,prev);
    const mdv=v_("md_"+ch,data), pmdv=v_("md_"+ch,prev);
    const bqlv=v_("bql_"+ch,data), pbqlv=v_("bql_"+ch,prev);

    const sc2=psv?pct(sv,psv):null;
    const hc=phv>0?pct(hv,phv):null;
    const conv=conv_(hv,mdv), pconv=conv_(phv,pmdv);
    const bqlMd=bqlMd_(mdv,bqlv), pbqlMd=bqlMd_(pmdv,pbqlv);
    const bqlH=bqlH_(hv,bqlv), pbqlH=bqlH_(phv,pbqlv);

    const lines=[];

    // ── 1. Lead with Sales CAC movement ──
    if(sc2!==null&&Math.abs(sc2)>=5){
      const dir=sc2>0?"increased":"decreased";
      lines.push(sig(`Sales CAC ${dir} from ₹${fmt(psv)} to ₹${fmt(sv)} (${p2(sc2)})`));
    }

    // ── 2. Headcount — key driver for Sales CAC ──
    if(ch==="Digital"||ch==="Referral"||ch==="SolarPro"){
      const scH=v_("hc_sc",data), pscH=v_("hc_sc",prev);
      if(scH&&pscH&&Math.abs(pct(scH,pscH))>=10){
        const dir=scH>pscH?"increased":"decreased";
        lines.push(diag(`Active SC headcount ${dir} from ${pscH} to ${scH} (${p2(pct(scH,pscH))})`));
      }
      const lrmH=v_("hc_lrm",data), plrmH=v_("hc_lrm",prev);
      if(lrmH&&plrmH&&Math.abs(pct(lrmH,plrmH))>=15){
        const dir=lrmH>plrmH?"increased":"decreased";
        lines.push(diag(`LRM headcount ${dir} from ${plrmH} to ${lrmH} (${p2(pct(lrmH,plrmH))})`));
      }
    }
    if(ch==="BTL Activity"){
      const btlHc=v_("hc_btl",data), pbtlHc=v_("hc_btl",prev);
      if(btlHc&&pbtlHc&&Math.abs(pct(btlHc,pbtlHc))>=10){
        const dir=btlHc>pbtlHc?"increased":"decreased";
        lines.push(diag(`BTL headcount ${dir} from ${pbtlHc} to ${btlHc} (${p2(pct(btlHc,pbtlHc))})`));
      }
    }

    // ── 3. Conversion (HoTo/FMD) ──
    if(pconv!==null&&conv!==null&&Math.abs(conv-pconv)>=2){
      const dir=conv<pconv?"fell":"rose";
      lines.push(diag(`Conversion (HoTo/FMD) ${dir} from ${pconv.toFixed(1)}% to ${conv.toFixed(1)}%`));
    }

    // ── 4. HoTo volume ──
    if(phv>0&&hc!==null&&hc<=-20)
      lines.push(sig(`HoTo dropped from ${phv} to ${hv} (${p2(hc)})`));
    else if(phv>0&&hc!==null&&Math.abs(hc)>=5)
      lines.push(diag(`HoTo moved from ${phv} to ${hv} (${p2(hc)})`));

    // ── 5. BQL→FMD ──
    if(pbqlMd!==null&&bqlMd!==null&&Math.abs(bqlMd-pbqlMd)>=3){
      const dir=bqlMd<pbqlMd?"dropped":"improved";
      lines.push(diag(`BQL to FMD ${dir} from ${pbqlMd.toFixed(1)}% to ${bqlMd.toFixed(1)}%`));
    }

    // ── 6. BQL→HoTo ──
    if(pbqlH!==null&&bqlH!==null&&Math.abs(bqlH-pbqlH)>=2){
      const dir=bqlH<pbqlH?"dropped":"improved";
      lines.push(diag(`BQL to HoTo ${dir} from ${pbqlH.toFixed(1)}% to ${bqlH.toFixed(1)}%`));
    }

    // ── 7. Sales cost movement (% terms, no absolute) ──
    const sCostK=sCostKey(ch);
    const scc=v_(sCostK,data), pscc=v_(sCostK,prev);
    if(scc&&pscc&&Math.abs(pct(scc,pscc))>=10){
      const dir=scc>pscc?"increased":"decreased";
      lines.push(diag(`Sales cost allocation (${ch}) ${dir} by ${p2(pct(scc,pscc))}`));
    }

    if(lines.length>0) salesCh.push({ch,sv,psv,sc2,hv,phv,conv,pconv,lines});
  });

  // ── Render ──────────────────────────────────────────────────────────────
  function chCard({ch,mv,pmv,mc,sv,psv,sc2,hv,phv,conv,pconv,lines},isMkt){
    const cacStr=isMkt?
      (pmv?`Mktg CAC: ₹${fmt(pmv)}→₹${fmt(mv)}${mc!==null?" ("+p2(mc)+")":""}`:``):
      (psv?`Sales CAC: ₹${fmt(psv)}→₹${fmt(sv||0)}${sc2!==null?" ("+p2(sc2)+")":""}`:``);
    const metaStr=`HoTo: ${phv||"-"}→${hv||"-"} | Conv(HoTo/FMD): ${pconv!==null?pconv.toFixed(1)+"%":"-"}→${conv!==null?conv.toFixed(1)+"%":"-"}`;
    return`<div class="ins-sec">
      <div class="ins-hdg">${ch} — ${cacStr}</div>
      <div class="ins-line diag" style="font-size:10px;color:#5070a0;padding-bottom:2px">${metaStr}</div>
      ${lines.join("")}
    </div>`;
  }

  const mktHtml=mktCh.length===0?
    `<div style="padding:8px;color:#166534;font-size:11px">No flagged movements across marketing channels.</div>`:
    mktCh.map(c=>chCard({...c},true)).join("");

  const salesHtml=salesCh.length===0?
    `<div style="padding:8px;color:#166534;font-size:11px">No flagged movements across sales channels.</div>`:
    salesCh.map(c=>chCard({...c,...{mv:c.sv,pmv:c.psv,mc:c.sc2}},false)).join("");

  return`${badge}
    <div style="margin-top:7px;margin-bottom:9px">${metricsTable}</div>
    <div class="two">
      <div>
        <div class="stitle" style="margin-bottom:6px">MARKETING — Channel Diagnosis</div>
        <div class="card">${mktHtml}</div>
      </div>
      <div>
        <div class="stitle" style="margin-bottom:6px">SALES — Channel Diagnosis</div>
        <div class="card">${salesHtml}</div>
      </div>
    </div>`;
}


// ── Compare Tab ───────────────────────────────────────────────────────────
function buildCompare(){
  const allCities=[...EXISTING,...EXPANSION].filter(c=>Object.values(D).some(m=>m[c]));

  function cityOption(val, sel){
    return allCities.map(c=>`<option value="${c}"${c===val?" selected":""}>${c}</option>`).join("");
  }

  function addCmpMonth(m){
    if(cmpMonths.includes(m))return;
    cmpMonths=[...cmpMonths,m].sort((a,b)=>ALL_MONTHS.indexOf(a)-ALL_MONTHS.indexOf(b));
    renderCompare();
  }
  function removeCmpMonth(m){
    if(cmpMonths.length<=1)return;
    cmpMonths=cmpMonths.filter(x=>x!==m);
    renderCompare();
  }

  const monthSel=ALL_MONTHS.map(m=>`<span class="mpill${cmpMonths.includes(m)?" on":""}" onclick="toggleCmpMonth('${m}')" style="margin:2px">${m}</span>`).join("");

  const CM=cmpMonths;

  function cmpRow(label, key1, key2, fmt1=fmt, fmt2=fmt, rowCls=""){
    return CM.map(m=>{
      const d1=gd(cmpCity1,m), d2=gd(cmpCity2,m);
      const v1=d1?.[key1], v2=d2?.[key2];
      return`<div class="cmp-val">${fmt1(v1)}</div><div class="cmp-val">${fmt2(v2)}</div>`;
    }).join("");
  }

  // Build comparison grid headers
  const monthHeaders=CM.map(m=>`<div class="cmp-hdr" style="grid-column:span 2">${m}</div>`).join("");
  const cityHeaders=CM.map(m=>`<div class="cmp-hdr">${cmpCity1}</div><div class="cmp-hdr">${cmpCity2}</div>`).join("");

  function cmpDataRow(lbl, keys, fmtFn=fmt, cls=""){
    const [k1,k2]=Array.isArray(keys)?keys:[keys,keys];
    const cells=CM.map(m=>{
      const d1=gd(cmpCity1,m),d2=gd(cmpCity2,m);
      return`<div class="cmp-val">${fmtFn(d1?.[k1])}</div><div class="cmp-val">${fmtFn(d2?.[k2])}</div>`;
    }).join("");
    return`<div class="cmp-lbl${cls?" "+cls:""}">${lbl}</div>${cells}`;
  }

  function cmpConvRow(lbl, hKey, mdKey){
    const cells=CM.map(m=>{
      const d1=gd(cmpCity1,m),d2=gd(cmpCity2,m);
      const v1=d1?.[mdKey]>0?(d1[hKey]/d1[mdKey]*100):null;
      const v2=d2?.[mdKey]>0?(d2[hKey]/d2[mdKey]*100):null;
      return`<div class="cmp-val">${v1!==null?v1.toFixed(1)+"%":"-"}</div><div class="cmp-val">${v2!==null?v2.toFixed(1)+"%":"-"}</div>`;
    }).join("");
    return`<div class="cmp-lbl">${lbl}</div>${cells}`;
  }

  function cmpBqlMdRow(lbl, ch){
    const cells=CM.map(m=>{
      const d1=gd(cmpCity1,m),d2=gd(cmpCity2,m);
      const bk1=ch?d1?.["bql_"+ch]:d1?.bql_total, md1=ch?d1?.["md_"+ch]:d1?.md_total;
      const bk2=ch?d2?.["bql_"+ch]:d2?.bql_total, md2=ch?d2?.["md_"+ch]:d2?.md_total;
      const v1=bk1>0?(md1/bk1*100):null, v2=bk2>0?(md2/bk2*100):null;
      return`<div class="cmp-val">${v1!==null?v1.toFixed(1)+"%":"-"}</div><div class="cmp-val">${v2!==null?v2.toFixed(1)+"%":"-"}</div>`;
    }).join("");
    return`<div class="cmp-lbl">${lbl}</div>${cells}`;
  }

  const gridCols=`grid-template-columns: 180px ${CM.map(()=>"1fr 1fr").join(" ")}`;

  const sections=[
    // CAC
    `<div class="cmp-sec">CAC SUMMARY</div>
     ${cmpDataRow("No of HoTos","hoto_total")}
     ${cmpDataRow("Marketing CAC","mkt_cac",v=>"₹"+fmt(v))}
     ${CH.map(ch=>cmpDataRow("  "+ch,"mkt_cac_"+ch,v=>"₹"+fmt(v))).join("")}
     ${cmpDataRow("Sales CAC","sales_cac",v=>"₹"+fmt(v))}
     ${CH.map(ch=>cmpDataRow("  "+ch,sKey(ch),v=>"₹"+fmt(v))).join("")}
     ${cmpDataRow("Total CAC","total_cac",v=>"₹"+fmt(v))}`,
    // Conversion
    `<div class="cmp-sec">CONVERSION (HoTo/MD)</div>
     ${CH.map(ch=>cmpConvRow(ch,"hoto_"+ch,"md_"+ch)).join("")}
     ${cmpConvRow("Total","hoto_total","md_total")}`,
    // BQL→MD
    `<div class="cmp-sec">BQL → MD</div>
     ${CH.map(ch=>cmpBqlMdRow(ch,ch)).join("")}
     ${cmpBqlMdRow("Total",null)}`,
    // Marketing cost
    `<div class="cmp-sec">MARKETING COST (₹L)</div>
     ${cmpDataRow("Digital Total","mkt_cost_Digital",v=>fmtL(v)+"L")}
     ${cmpDataRow("  DM Spends","mkt_cost_digital_dm",v=>fmtL(v)+"L")}
     ${cmpDataRow("  SIQ Spend","mkt_cost_digital_siq",v=>fmtL(v)+"L")}
     ${cmpDataRow("  Pre Design","mkt_cost_digital_pre",v=>fmtL(v)+"L")}
     ${cmpDataRow("Referral Total","mkt_cost_Referral",v=>fmtL(v)+"L")}
     ${cmpDataRow("  Referral Comm","mkt_cost_ref_comm",v=>fmtL(v)+"L")}
     ${cmpDataRow("  Pre Design","mkt_cost_ref_pre",v=>fmtL(v)+"L")}
     ${cmpDataRow("SolarPro Total","mkt_cost_SolarPro",v=>fmtL(v)+"L")}
     ${cmpDataRow("  SolarPro Comm","mkt_cost_sp_comm",v=>fmtL(v)+"L")}
     ${cmpDataRow("  Pre Design","mkt_cost_sp_pre",v=>fmtL(v)+"L")}
     ${cmpDataRow("BTL Total (excl WA)","mkt_cost_btl_total_adj",v=>fmtL(v)+"L")}
     ${cmpDataRow("  BTL Team Cost","mkt_cost_btl_team",v=>fmtL(v)+"L")}
     ${cmpDataRow("  SIQ","mkt_cost_btl_siq",v=>fmtL(v)+"L")}
     ${cmpDataRow("  Pre Design","mkt_cost_btl_pre",v=>fmtL(v)+"L")}
     ${cmpDataRow("IVR Total","mkt_cost_IVR Activity",v=>fmtL(v)+"L")}
     ${cmpDataRow("  IVR Cost","mkt_cost_ivr_cost",v=>fmtL(v)+"L")}
     ${cmpDataRow("Total Mktg Cost","mkt_cost_total",v=>fmtL(v)+"L")}`
  ].join("");

  return`<div style="margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:8px">
      <div class="sel-wrap" style="background:rgba(12,36,97,0.05);padding:5px 9px;border-radius:3px">
        <div class="sel-lbl" style="color:#0c2461">City 1</div>
        <select onchange="cmpCity1=this.value;renderCompare()" style="background:#fff;color:#0c2461;border-color:#d0dff0">${cityOption(cmpCity1,cmpCity1)}</select>
      </div>
      <div class="sel-wrap" style="background:rgba(12,36,97,0.05);padding:5px 9px;border-radius:3px">
        <div class="sel-lbl" style="color:#0c2461">City 2</div>
        <select onchange="cmpCity2=this.value;renderCompare()" style="background:#fff;color:#0c2461;border-color:#d0dff0">${cityOption(cmpCity2,cmpCity2)}</select>
      </div>
      <div class="sel-wrap" style="background:rgba(12,36,97,0.05);padding:5px 9px;border-radius:3px">
        <div class="sel-lbl" style="color:#0c2461">Months (multi-select)</div>
        <div style="display:flex;gap:3px;flex-wrap:wrap">${monthSel}</div>
      </div>
    </div>
    <div class="sx"><div style="display:grid;${gridCols};border:1px solid #d0dff0;border-radius:2px;overflow:hidden;background:#fff">
      <div class="cmp-hdr"></div>${monthHeaders}
      <div class="cmp-hdr" style="background:#1a3a8a">Metric</div>${cityHeaders}
      ${sections}
    </div></div>
  </div>`;
}

function renderCompare(){
  const cnt=document.getElementById("content");
  cnt.innerHTML=buildCompare();
}
function toggleCmpMonth(m){
  if(cmpMonths.includes(m)){if(cmpMonths.length<=1)return;cmpMonths=cmpMonths.filter(x=>x!==m);}
  else{cmpMonths=[...cmpMonths,m].sort((a,b)=>ALL_MONTHS.indexOf(a)-ALL_MONTHS.indexOf(b));}
  renderCompare();
}

// ── Init ──────────────────────────────────────────────────────────────────
initCitySelect();
initMonthPills();
render();
</script>
